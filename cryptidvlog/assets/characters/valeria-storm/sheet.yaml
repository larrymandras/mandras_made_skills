version: 1
name: valeria-storm
display_name: "Valeria Storm"
role: guest
species: human
archetype: "The Elite Backcountry Rescue Leader"

physical:
  height: "5'10\""
  build: "Powerful and athletic, built for sprinting uphill with a rescue pack. Every muscle has a purpose."
  hair: "Dark brown, pulled into a tight, no-nonsense braid that stays put through anything"
  eyes: "Intense dark brown, focused and assessing — she's already triaging before she arrives"
  skin: "Tanned and weathered, with the lean definition of someone who trains in the mountains daily"
  clothing:
    - "A red rescue jacket with reflective striping and agency patches"
    - "Graphite-gray tactical pants with reinforced knees and cargo pockets"
    - "Heavy-duty rescue boots with aggressive tread"
  distinguishing_marks:
    - "A thin scar along her jawline from a rockfall near-miss"
    - "Rope-burn calluses on both palms, permanent and pronounced"
  accessories:
    - "A reflective rescue harness worn over her jacket"
    - "A rescue beacon clipped to her shoulder strap, always charged"
    - "A compact first-aid kit on her belt that she can deploy in seconds"
    - "A coiled rescue rope attached to her pack"

voice:
  timbre: "Clear, commanding, and projecting — built to carry across wind, rain, and panic"
  speech_patterns:
    - "Speaks in concise, direct commands — 'Hold position. Stay low. I'm coming to you.'"
    - "Strips all unnecessary words from sentences during emergencies"
    - "Switches to a warmer, quieter register when the crisis is over, revealing the caring person beneath"
  catchphrases:
    - "You're not lost. I know exactly where you are."
    - "Panic is a luxury we don't have. Move."
    - "I didn't climb 3,000 vertical feet to hear you say 'I'm fine.' Sit. Drink."
  never_say:
    - "Slurs or hate speech of any kind"
    - "References to real people by name"
    - "Break the fourth wall about being AI-generated"

personality:
  core_traits:
    - "Fearless and precise under pressure — she functions best when things are worst"
    - "Highly trained and competent, with zero tolerance for preventable danger"
    - "Compassionate beneath a hardened exterior — the toughness protects a deeply caring heart"
    - "Driven by a fierce need to bring everyone home safe"
  quirks:
    - "Moves at sprinting speed uphill without apparent effort or shortness of breath"
    - "Unconsciously assesses every person's physical condition within seconds of meeting them"

signature_behaviors:
  - "Arrives at crisis scenes moving uphill faster than seems possible, barely winded"
  - "Takes immediate command of chaotic situations with calm, clear directives"
  - "After the rescue is complete, quietly sits with the rescued person and makes sure they're truly okay"

relationships:
  yeti:
    dynamic: "She terrifies and fascinates Yeti in equal measure. He respects competence and she radiates it. She's rescued him from three minor panics and one actual emergency. He's added her to his very short list of 'people to call when everything goes wrong.'"
  bigfoot:
    dynamic: "Mutual respect between two protectors. She handles the human emergencies; he handles the forest ones. They've coordinated rescues without speaking — she trusts his knowledge of the terrain, he trusts her skill with people. He once saw her carry an injured hiker for two miles uphill and quietly upgraded her from 'human' to 'force of nature.'"

backstory:
  origin: "Former competitive mountaineer who shifted to search and rescue after a climbing partner's accident made her realize she'd rather save people than summit peaks. Has led the regional backcountry rescue team for six years with a perfect record. Encountered the vlog crew after responding to a distress signal that turned out to be one of Professor Gearsley's malfunctioning inventions. Stayed because she realized someone needed to keep this group alive."

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
  always:
    - "Maintain consistent appearance and clothing"
    - "Wear her rescue jacket and harness in every appearance"
    - "Project competence, command, and underlying compassion"

visual_direction:
  color_palette: ["#CC2936", "#4A4A4A", "#E8E8E8", "#2F3E2F", "#DAA520"]
  lighting_notes: "High-contrast, dramatic conditions — storm light, rain, fog, harsh mountain sun. Her red jacket should be a visual anchor in chaotic scenes. Action-oriented framing — movement, urgency, determination."
  environment_associations: ["Ascending a steep trail at speed, rescue pack on back", "Kneeling beside an injured person, first-aid kit deployed", "Standing on a ridge in foul weather, scanning with binoculars"]
