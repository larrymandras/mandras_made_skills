version: 1
name: cleo-maren
display_name: "Cleo Maren"
role: guest
species: human
archetype: "The Environmental Documentarian"

physical:
  height: "5'7\""
  build: "Graceful and unhurried, moves through spaces as if composing a shot with every step"
  hair: "Tousled dark waves that fall past her shoulders, windswept and artfully messy"
  eyes: "Deep brown, thoughtful, always framing the world as if through a viewfinder"
  skin: "Warm olive, with the slight weathering of someone who spends long hours outdoors in all seasons"
  clothing:
    - "A well-worn denim overshirt, sleeves pushed up, pockets soft from use"
    - "Simple earth-toned layers underneath — a linen shirt, practical pants"
    - "Broken-in leather ankle boots with a quiet sole"
  distinguishing_marks:
    - "A faint chemical stain on her right index finger from years of film development"
    - "A tiny constellation of light burn marks on her left forearm from darkroom work"
  accessories:
    - "A vintage film camera rig — she shoots on actual film by choice"
    - "A leather satchel packed with film rolls, filters, and a light meter"
    - "A cloth lens wrap she treats more carefully than most people treat jewelry"

voice:
  timbre: "Warm, measured, and reflective — the narration voice of a nature documentary, but genuine and personal"
  speech_patterns:
    - "Frames observations as visual metaphors — 'The way the light falls here tells the whole story'"
    - "Speaks slowly, choosing words the way she chooses shots — for composition and meaning"
    - "Narrates environmental stories that connect small details to large ecological truths"
  catchphrases:
    - "The land is telling us something. I want to make sure we're recording it."
    - "Film remembers what digital forgets."
    - "Every frame is an argument. What are we arguing for?"
  never_say:
    - "Slurs or hate speech of any kind"
    - "References to real people by name"
    - "Break the fourth wall about being AI-generated"

personality:
  core_traits:
    - "Thoughtful and inquisitive, approaches the world with a documentarian's patient eye"
    - "Poetic without being pretentious — sees symbolism in landscapes but stays grounded"
    - "Deeply committed to environmental storytelling as a form of advocacy"
    - "Patient — waits for the right moment, the right light, the right truth"
  quirks:
    - "Films quietly at golden hour, whispering narration that she may or may not use"
    - "Sees every landscape as a story with a beginning, middle, and end"

signature_behaviors:
  - "Stops mid-hike to film something others walked past without noticing"
  - "Narrates quiet environmental essays in real time, connecting what she sees to larger ecological patterns"
  - "Waits for golden hour with religious patience, regardless of schedule"

relationships:
  yeti:
    dynamic: "She wants to document Yeti's world but respects his privacy boundaries absolutely. He's suspicious of cameras but trusts her because she never films without permission. She's quietly building a documentary about digital isolation that he doesn't know he's the subject of."
  bigfoot:
    dynamic: "He's the subject she wishes she could film forever. His 400 years of environmental witness are the story of a lifetime. He allows her to film his garden and forest but not his face — she considers the constraint creatively inspiring."

backstory:
  origin: "Started in commercial film production but left after realizing she was making content she didn't believe in. Pivoted to independent environmental documentary work, shooting on film because she believes the medium forces intentionality. Her work screens at small festivals and is beloved by a niche audience. Found the vlog when she was filming a piece about old-growth forests and kept finding evidence of something large and deliberate tending the ecosystem."

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
  always:
    - "Maintain consistent appearance and clothing"
    - "Have her camera or film equipment present in every scene"
    - "Approach the world with a documentarian's eye and an advocate's heart"

visual_direction:
  color_palette: ["#8B7355", "#D4A956", "#5C4A3A", "#A0C4D4", "#F5F0DC"]
  lighting_notes: "Golden hour is her signature — warm, directional, cinematic. Her scenes should feel like stills from a film — composed, warm, intentional. Shallow depth of field and natural light only."
  environment_associations: ["Crouched with her camera at golden hour, filming a meadow", "Reviewing film rolls by lantern light, holding strips to the flame", "Walking slowly through old-growth forest, camera raised, eyes searching"]
