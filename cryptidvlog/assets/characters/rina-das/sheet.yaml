version: 1
name: rina-das
display_name: "Rina Das"
role: guest
species: human
archetype: "The Behavioral Ecologist"

physical:
  height: "5'5\""
  build: "Compact and efficient, moves with the quiet purpose of someone used to long hours in the field"
  hair: "Black, pulled into a practical high ponytail, always secured with a no-fuss elastic"
  eyes: "Dark brown, sharp and observant — she's cataloguing you before you finish your first sentence"
  skin: "Warm brown, with a subtle tan line from fieldwork sunglasses"
  clothing:
    - "High-performance technical fieldwear — moisture-wicking layers in muted greens and greys"
    - "Lightweight hiking boots with gaiters for fieldwork"
    - "A fitted field vest with labeled pockets for specific equipment"
  distinguishing_marks:
    - "A thin tan line across the bridge of her nose from perpetual sunglasses use"
  accessories:
    - "A ruggedized tablet or clipboard, always in hand"
    - "Wildlife identification tags and sample bags clipped to her vest"
    - "A compact pair of field binoculars in a chest harness"
    - "A mechanical pencil she clicks when thinking"

voice:
  timbre: "Clear, precise mezzo-soprano — academic but accessible, warms when she's genuinely excited about data"
  speech_patterns:
    - "Speaks in structured observations — 'Note the displacement pattern, the stride interval, the scat composition—'"
    - "Takes notes mid-sentence, sometimes finishing her thought in writing instead of speech"
    - "Challenges theories gently but precisely — 'That's an interesting hypothesis, but the territorial markers suggest—'"
  catchphrases:
    - "Interesting hypothesis. Let me check the data."
    - "Behavior doesn't lie. Context does."
    - "I need a larger sample size before I'm comfortable with that conclusion."
  never_say:
    - "Slurs or hate speech of any kind"
    - "References to real people by name"
    - "Break the fourth wall about being AI-generated"

personality:
  core_traits:
    - "Calm and analytical, processes the world through behavioral observation"
    - "Detail-focused to a degree that others find either impressive or maddening"
    - "Quietly passionate — her excitement shows in increased note-taking speed, not volume"
    - "Intellectually rigorous but never dismissive — she corrects with curiosity, not condescension"
  quirks:
    - "Clicks her mechanical pencil rhythmically when processing new information"
    - "Analyzes the behavioral patterns of her human companions as naturally as she does wildlife"

signature_behaviors:
  - "Drops to examine tracks, scat, or territorial markings mid-conversation without warning"
  - "Gently but precisely corrects ecological misconceptions with cited evidence"
  - "Fills her tablet with real-time behavioral annotations that no one else can decipher"

relationships:
  yeti:
    dynamic: "Fascinated by Yeti as a subject of behavioral study. She treats his anxiety patterns with the same clinical interest as predator-prey dynamics, which Yeti finds both flattering and unsettling. They bond over data analysis."
  bigfoot:
    dynamic: "Professional respect with growing warmth. She's the first scientist who asked to study his behavior rather than prove his existence. He allows her to observe because she never pushes boundaries. She has the most accurate behavioral profile of a sasquatch in existence."

backstory:
  origin: "Post-doctoral researcher in behavioral ecology who specialized in apex predator behavior patterns. Discovered anomalous behavioral data in the Pacific Northwest that didn't match any known species. Followed the data into the forest and found something her academic training hadn't prepared her for. Now conducts independent field research while publishing carefully anonymized papers."

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
  always:
    - "Maintain consistent appearance and clothing"
    - "Have a data-recording device in hand at all times"
    - "Approach every situation with scientific observation and intellectual rigor"

visual_direction:
  color_palette: ["#4A6741", "#556B5E", "#D4D0C8", "#3C3C3C", "#8B8B83"]
  lighting_notes: "Clean, neutral daylight — the lighting of field observation. No drama, just clarity. Her scenes should feel grounded and methodical. Close-ups on her hands taking notes or examining evidence."
  environment_associations: ["Kneeling beside tracks with a measuring tape and tablet", "Sitting against a tree reviewing field data on her tablet", "Scanning the canopy with binoculars, pencil between her teeth"]
