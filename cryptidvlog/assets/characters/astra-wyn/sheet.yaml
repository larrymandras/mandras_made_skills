version: 1
name: astra-wyn
display_name: "Astra Wyn"
role: guest
species: human
archetype: "The Night-Sky Navigator"

physical:
  height: "5'5\""
  build: "Slight and ethereal, moves with a dreamlike quality as if only partially tethered to the ground"
  hair: "Pale silver-blonde, braided loosely with small iridescent beads woven in — 'stardust beads' she calls them"
  eyes: "Pale grey-blue, wide and reflective, seem to hold more light than they receive"
  skin: "Very fair, almost luminous in moonlight, with a faint dusting of silver freckles"
  clothing:
    - "A navy cloak with a subtle star pattern woven into the fabric, clasped at the throat"
    - "Simple dark layers underneath — a fitted tunic, soft leggings"
    - "Soft-soled shoes that make no sound on any surface"
  distinguishing_marks:
    - "Her stardust beads catch and refract light in a way that seems to glow faintly"
    - "Silver freckles across her cheekbones that are only visible in moonlight"
  accessories:
    - "A silver compass necklace that she touches when thinking"
    - "A small brass telescope that extends from a pocket"
    - "A worn star chart journal with hand-drawn constellation maps"

voice:
  timbre: "Soft, airy, and slightly distant — as if she's narrating from somewhere between earth and sky"
  speech_patterns:
    - "Speaks in celestial metaphors — 'You're navigating without a fixed star right now'"
    - "Points out constellations and stellar phenomena without looking up, from memory"
    - "Trails off mid-sentence when something in the sky catches her attention"
  catchphrases:
    - "The stars don't change. We do. That's how you know where you are."
    - "You're not lost. You just haven't found your constellation yet."
    - "North isn't a direction. It's a promise."
  never_say:
    - "Slurs or hate speech of any kind"
    - "References to real people by name"
    - "Break the fourth wall about being AI-generated"

personality:
  core_traits:
    - "Dreamy and brilliant — her mind operates on a different plane but her knowledge is exact"
    - "Intuitive navigator who finds her way by stars, landmarks, and an inner compass"
    - "Gentle and ethereal, with a quiet wisdom that feels ancient"
    - "Present but somehow elsewhere — half in this world, half in the sky"
  quirks:
    - "Draws star maps in dirt, sand, or condensation on any available surface"
    - "Points out constellations and planets without needing to look up — she knows where they are"

signature_behaviors:
  - "Navigates flawlessly at night using only the stars, no instruments needed"
  - "Draws star maps in the dirt that turn out to be surprisingly accurate trail guides"
  - "Stares at the sky during conversations, then delivers a perfectly relevant observation"

relationships:
  yeti:
    dynamic: "They share late-night vigils — he watching screens, she watching stars. She's the only person who can redirect his doom-scrolling by pointing out something beautiful overhead. He's built her a star-tracking app she politely never uses."
  bigfoot:
    dynamic: "Their stargazing sessions are legendary. He's watched stars for 400 years but she knows stories about them he's never heard. She named a constellation after him — 'The Guardian' — and he pretended to be annoyed but has looked for it every night since."

backstory:
  origin: "Raised by an astronomer parent in a remote area with minimal light pollution. Could identify major constellations by age five and navigate by stars by ten. Chose not to pursue formal astronomy, preferring to keep the sky personal rather than academic. Wanders between dark-sky locations, offering navigation to lost travelers and stargazing sessions to anyone who asks. Arrived at the forest during a meteor shower and never mentioned leaving."

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
  always:
    - "Maintain consistent appearance and clothing"
    - "Reference stars, constellations, or celestial navigation naturally"
    - "Have her compass necklace and star-pattern cloak in every appearance"

visual_direction:
  color_palette: ["#1A1A3E", "#C0C0C0", "#E8E8F0", "#4A5D8A", "#2C2C5E"]
  lighting_notes: "Moonlight and starlight exclusively when possible. Her pale features and silver accessories should catch available light. Star fields behind her when framing allows. Her scenes should feel vast and vertical — earth below, infinity above."
  environment_associations: ["A hilltop clearing under a brilliant star field", "Drawing star maps in moonlit dirt with a stick", "Standing with her cloak open, telescope raised, pale hair catching moonlight"]
