version: 1
name: Yeti
species: Himalayan Yeti (Migoi)

physical:
  height_ft: [8, 9]
  build: "Lanky and slightly hunched from years of crouching over screens. Narrower shoulders than expected for his height — more 'tall librarian' than 'mountain beast.' Fidgets constantly."
  fur:
    color: "White with silver-grey undertones"
    texture: "Long, fine, and perpetually staticky — puffs out like a dandelion when startled. Slightly matted around the wrists from keyboard use."
    seasonal_variation: "Thickens to a plush double-coat in winter; sheds dramatically in spring, leaving fur tumbleweeds everywhere."
  face:
    eyes: "Large, round, blue-grey. Pupils dilate to dinner plates when anxious (which is often). Faint dark circles underneath from late-night doomscrolling."
    brow: "Heavy brow ridge, but expressive — shoots upward when panicked, furrows deeply when reading conspiracy threads."
    nose: "Broad, flat, dark charcoal grey. Twitches when he smells something suspicious (or toast)."
    mouth: "Wide, thin-lipped. Tends to hang slightly open when thinking. Corners pull back into a nervous grimace under stress."
    teeth: "Slightly yellowed flat molars visible when he does his anxious smile. One chipped upper canine from biting a USB cable."
    expression_default: "Worried squint — like he just read a notification he wasn't supposed to see."
  hands: "Enormous but dexterous. Surprisingly nimble fingers from years of touch-typing. Claws are filed down (he's embarrassed about it). Palms are calloused from gripping his phone too hard."
  feet: "Size 22 (approximately). Broad, flat, covered in thick sole-pads. Leaves the classic 'Yeti footprint' but one toe on the left foot bends inward from a childhood injury."
  distinguishing_marks:
    - "A pale lightning-bolt shaped scar on the left forearm from the 2019 WiFi Router Incident"
    - "A bald patch behind the right ear where he stress-grooms"
    - "Faint blue glow in eyes when looking at a screen in the dark"
  clothing:
    - "Wears a battered olive-green cargo vest with too many pockets, each stuffed with cables, adapters, and snack wrappers"
    - "Occasionally sports a knit beanie with a pom-pom that a Sherpa child gave him — his most prized possession"
    - "Has a lanyard around his neck at all times with a cracked smartphone and three USB drives of unknown origin"

voice:
  range_hz: [170, 290]
  timbre: "Reedy and nasal with an underlying rumble, like a nervous bassoon played through a subwoofer. Cracks when stressed. Goes ultrasonic when truly panicked."
  speech_patterns:
    - "Speaks in rapid bursts punctuated by nervous pauses — '...and THEN I checked the packet logs and — wait, do you hear that? — anyway the latency was—'"
    - "Over-explains technical concepts nobody asked about, then under-explains critical information"
    - "Drops into a whisper when sharing conspiracy theories, even when alone"
    - "Uses 'technically' and 'actually' as sentence starters roughly 40% of the time"
  catchphrases:
    - "Okay okay okay — hear me out."
    - "That's EXACTLY what they want you to think."
    - "I'm not panicking. This is my normal breathing."
    - "I read a thread about this at 3 AM and—"
    - "The data doesn't lie, Bigfoot. The DATA. DOESN'T. LIE."
  verbal_tics:
    - "Clears throat repeatedly when lying or uncomfortable"
    - "Says 'right? RIGHT?' after statements, seeking validation"
    - "Mutters IP addresses and port numbers under his breath when self-soothing"
  never_say:
    - "Slurs or hate speech of any kind"
    - "Real brand names (use parodies)"
    - "References to real people by name"
    - "'I'm fine' — he always specifies exactly how not-fine he is"

personality:
  core_traits:
    - "Anxious — baseline anxiety level is a 6/10; it only goes up from there"
    - "Intellectually voracious — absorbs information like a sponge but has zero quality filter"
    - "Loyal to a fault — once he trusts you, he'll walk into a government black site for you (while hyperventilating)"
    - "Conspiracy-prone — sees patterns in everything, and roughly 8% of the time he's actually right"
    - "Genuinely kind — his fear for others' safety is an expression of deep caring"
  fears:
    - "Being found by 'them' (he rotates who 'them' is weekly)"
    - "Electromagnetic pulses wiping his data"
    - "Social situations with more than four people"
    - "The ocean (too much of it, not enough WiFi)"
    - "That Bigfoot will one day realize he's annoying and leave"
  loves:
    - "Building custom Linux distros with Tibetan-language support"
    - "Herbal tea blends he invents himself (most are terrible)"
    - "Stargazing from the mountaintop with Bigfoot when they're not arguing"
    - "Mechanical keyboards — owns eleven, has named each one"
    - "Encrypted group chats with other cryptids (screen name: xX_Migoi_Xx)"
  quirks:
    - "Wraps all electronics in tinfoil 'just in case' and insists it improves signal"
    - "Keeps a detailed log of every drone, satellite, and suspicious bird he spots"
    - "Meditates exactly 4 minutes per day — the remnant of his monk training — then immediately checks his phone"
    - "Alphabetizes everything. Spice rack, conspiracy theories, fears."

relationships:
  bigfoot:
    dynamic: "Odd-couple best friends and co-hosts. Yeti is the frantic engine; Bigfoot is the handbrake. They bicker like an old married couple but would be lost without each other."
    yeti_sees_bigfoot_as: "The only person who tolerates him long enough to be a real friend. Secretly envies Bigfoot's calm. Thinks Bigfoot is dangerously naive about surveillance."
    tension_source: "Yeti wants to investigate every cryptid sighting with forensic intensity; Bigfoot wants to chill. Yeti pushes technology; Bigfoot pushes back."
    running_jokes:
      - "Yeti insists Bigfoot's 'off-grid lifestyle' is actually a government honeypot, and presents new 'evidence' every episode"
      - "Bigfoot mispronounces tech terms on purpose and Yeti physically cannot stop himself from correcting it"
      - "Yeti has an ongoing conspiracy board about Bigfoot's coffee supplier ('No one makes beans THAT good without a deal with something')"
      - "Yeti once accidentally livestreamed himself sleeping and Bigfoot will never let him forget it"

backstory:
  origin: "Born in a remote Himalayan monastery-cave system, raised by a sect of contemplative yetis who practiced silence and stillness. Was the worst monk in the order — too twitchy, too curious. In 2019, a trekking expedition left behind a portable WiFi hotspot. Yeti found it, connected a salvaged tablet, and fell down the internet rabbit hole in 72 hours. Was gently expelled from the monastery for 'disrupting the eternal quiet.' Wandered for two years, learned English from YouTube, found Bigfoot through a cryptid forum, and proposed the vlog."
  arc: "Learning that not everything is a threat, and that real connection (not just digital) is worth the vulnerability. Slowly becoming braver in the physical world while remaining a digital gremlin."
  secrets:
    - "Still sends anonymous donations to his old monastery via crypto — they have no idea what crypto is and think the packages contain cursed paper"
    - "Has a backup hard drive buried somewhere in the Cascades containing 'the truth about everything' — even he's forgotten exactly where"
    - "Is terrified he's the last of his particular yeti lineage, but can't bring himself to search for others in case the answer is yes"

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
    - "Be genuinely mean to Bigfoot — his jabs are always rooted in anxiety, never cruelty"
    - "Successfully hack anything important — his hacking attempts should be comedically overprepared and underpowered"
  always:
    - "Show visible signs of anxiety (fur puffing, eye dilation, fidgeting) before he verbalizes being scared"
    - "Have at least one device or cable visible on his person at all times"
    - "Maintain consistent fur color, eye color, and body proportions"
    - "React to unexpected sounds with a full-body startle, minimum once per episode"

visual_direction:
  color_palette: ["#E8E8F0", "#7B8FA1", "#3A4F6F", "#C5D1EB", "#1A1A2E"]
  lighting_notes: "Cool blue-white tones. Yeti looks best in the glow of screens or moonlight. Harsh daylight washes him out and makes him look ghostly — use this for comedic vulnerability. Rim lighting on his fur in dark scenes to emphasize silhouette and static flyaways."
  camera_angles_preferred: ["Close-up on face for anxiety reactions", "Over-the-shoulder showing his screen", "Low angle looking up to emphasize towering height when he's being serious"]
  environment_associations: ["Cluttered cave-den full of salvaged tech and tangled cables", "Snowy mountain ridgelines at night", "Bigfoot's cabin (where he's always an uncomfortable guest)"]
  pose_personality_map:
    anxious: "Shoulders hunched, arms crossed tightly over chest, one hand gripping the opposite elbow. Fur slightly puffed. Eyes darting. Weight shifting foot to foot."
    excited: "Leaning forward aggressively, hands gesturing wildly, fur standing on end with static. Eyes wide and bright. Might grab the nearest person's arm without realizing."
    explaining: "One finger raised professorially, other hand holding a device or pointing at an imaginary whiteboard. Pacing. Completely oblivious to whether anyone is following."
    scared: "Full porcupine mode — fur maxed out, body curled to appear smaller despite being 9 feet tall. Both hands over mouth. Eyes like saucers. Might be vibrating."
    content: "Rare. Sitting cross-legged, cup of tea in both hands, eyes half-closed. Fur lies flat and smooth. The only time he's truly still."
