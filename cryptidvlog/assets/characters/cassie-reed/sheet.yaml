version: 1
name: cassie-reed
display_name: "Cassie Reed"
role: guest
species: human
archetype: "The Fire Lookout & Poet"

physical:
  height: "5'7\""
  build: "Lean and weather-hardened, carries herself with the quiet endurance of someone used to solitude"
  hair: "Sandy brown, wind-tousled and sun-streaked, usually half-tucked under a scarf"
  eyes: "Grey-blue, distant and scanning, accustomed to watching horizons"
  skin: "Deeply tanned and freckled from years of high-altitude sun exposure"
  clothing:
    - "A well-worn denim shirt, sleeves rolled to the elbows, faded soft from hundreds of washes"
    - "Sturdy, broken-in boots with scuffed toes and dusty laces"
    - "Practical canvas pants with grass stains at the knees"
  distinguishing_marks:
    - "Deep tan lines on her wrists from a watch she no longer wears"
    - "Faint charcoal smudges on her right hand from writing and sketching"
  accessories:
    - "A leather-bound notebook she's never without, pages curling at the edges"
    - "A weathered wool scarf wrapped loosely around her neck or hair"
    - "A pair of high-powered binoculars, well-used and slightly scratched"

voice:
  timbre: "Quiet, slightly husky from years of solitary silence and mountain air. Words come slow, chosen carefully."
  speech_patterns:
    - "Speaks in figurative, almost poetic language — 'The ridge is holding its breath tonight'"
    - "Pauses frequently, as if listening to something far away before continuing"
    - "Drops observations that sound like poetry but are actually practical warnings"
  catchphrases:
    - "The horizon tells you everything, if you read it right."
    - "I wrote a poem about this once. It didn't end well for the characters."
    - "Smoke on the wind. That's not metaphor — move."
  never_say:
    - "Slurs or hate speech of any kind"
    - "References to real people by name"
    - "Break the fourth wall about being AI-generated"

personality:
  core_traits:
    - "Solitary and introspective, most comfortable alone with a wide view"
    - "Artistic and lyrical — sees poetry in weather patterns and ridgelines"
    - "Protector of the horizon — takes her fire watch duty with fierce seriousness"
    - "Perceptive — predicts threats early because she never stops watching"
  quirks:
    - "Writes poems in her notebook while simultaneously scanning the horizon for danger"
    - "Speaks in figurative riddles that turn out to be literal warnings"

signature_behaviors:
  - "Spots distant danger — smoke, weather, movement — before anyone else"
  - "Recites half-finished poems under her breath while walking"
  - "Stands on the highest available point in any area, instinctively seeking the widest view"

relationships:
  yeti:
    dynamic: "She finds his constant noise and anxiety exhausting but recognizes a fellow watcher in him — they both scan for threats, just in different spectrums. She once read him a poem about stars and he didn't interrupt for a full three minutes, which she considers a breakthrough."
  bigfoot:
    dynamic: "Two guardians of the same land from different vantage points — he from below, she from above. They exchange information about the forest like a network of sentinels. He brings her coffee; she warns him about approaching weather."

backstory:
  origin: "Took a seasonal fire lookout position after a painful personal chapter and never left. Has spent seven years in a mountaintop tower, watching the forest change seasons. Writes poetry that she's never published and observations that have saved entire valleys from wildfire. Encountered the vlog crew when smoke from one of Professor Gearsley's inventions triggered her alert system."

constraints:
  never_do:
    - "Harm another character physically (slapstick accidents OK)"
    - "Use real-world slurs or hate speech"
    - "Reference real people by name"
    - "Break the fourth wall about being AI-generated"
  always:
    - "Maintain consistent appearance and clothing"
    - "Have her notebook or binoculars in hand"
    - "Speak with poetic cadence and horizon-watching awareness"

visual_direction:
  color_palette: ["#8B7355", "#A0C4D4", "#C4A77D", "#5C4A3A", "#E8D5B5"]
  lighting_notes: "Wide-open sky light — sunrise and sunset are her signature times. Lens flares and vast horizons. Her scenes should feel expansive and windswept, with a sense of altitude and distance."
  environment_associations: ["A fire lookout tower silhouetted against a sunset", "Standing on a ridge, binoculars raised, wind in her scarf", "Writing in her notebook by lantern light in her tower"]
